name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-body:
    name: pr-body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          missing=()
          echo "$PR_BODY" | grep -q "## Summary"   || missing+=("'## Summary'")
          echo "$PR_BODY" | grep -q "## Test plan" || missing+=("'## Test plan'")
          echo "$PR_BODY" | grep -qE "Closes #[0-9]+" || missing+=("'Closes #<number>'")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "PR body missing required sections: ${missing[*]}"
            echo "See .github/pull_request_template.md"
            exit 1
          fi
          echo "PR body OK."

  pr-title:
    name: pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            ci
            docs
            refactor
            test
            chore
            style
            perf
            build
            revert
          requireScope: false

  backend:
    name: backend
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Create Neon branch
        if: env.NEON_API_KEY != '' && github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.number }}

      - run: go vet ./...

      - run: go test ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest

      - name: Delete Neon branch
        if: env.NEON_API_KEY != '' && github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.number }}

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build
