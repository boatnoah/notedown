name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-body:
    name: pr-body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          missing=()
          echo "$PR_BODY" | grep -q "## Summary"   || missing+=("'## Summary'")
          echo "$PR_BODY" | grep -q "## Test plan" || missing+=("'## Test plan'")
          echo "$PR_BODY" | grep -qE "Closes #[0-9]+" || missing+=("'Closes #<number>'")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "PR body missing required sections: ${missing[*]}"
            echo "See .github/pull_request_template.md"
            exit 1
          fi
          echo "PR body OK."

  pr-title:
    name: pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            ci
            docs
            refactor
            test
            chore
            style
            perf
            build
            revert
          requireScope: false

  backend:
    name: backend
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum

      - name: Create Neon branch
        id: neon-branch
        if: env.NEON_API_KEY != '' && github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.number }}

      - name: gofmt
        run: test -z "$(gofmt -l ./..)"

      - run: go vet ./...

      - run: go test ./...

      - name: govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.12.2

      - name: Delete Neon branch
        if: env.NEON_API_KEY != '' && github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.number }}

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npx prettier --check .

      - run: npx tsc --noEmit

      - run: npm run build

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "::error::Render deploy hook returned HTTP $response"
            exit 1
          fi
          echo "Render deploy triggered (HTTP $response)"
